<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHIKIZICOIN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --accent: #ff4500; --accent-glow: rgba(255, 69, 0, 0.5);
            --bg: #0d0d0d; --panel: #1a1a1a; --border: #333;
            --text: #ffffff; --gold: #ffd700;
            --nitro: #a020f0; --nitro-glow: rgba(160, 32, 240, 0.5);
        }

        html, body { overscroll-behavior-y: contain; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; user-select: none; margin: 0; padding: 0; }
        
        body {
            background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif;
            min-height: 100vh; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column;
            align-items: center; perspective: 1200px; padding-bottom: 50px;
        }

        /* --- HEADER --- */
        header {
            width: 100%; padding: 10px 15px; background: var(--panel);
            border-bottom: 2px solid var(--border); display: flex;
            justify-content: space-between; align-items: center; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: sticky; top: 0;
            flex-wrap: nowrap; gap: 5px;
        }

        .header-left, .header-right { flex: 1 1 0; display: flex; overflow: hidden; }
        .header-left { justify-content: flex-start; align-items: center; gap: 8px; }
        .header-right { justify-content: flex-end; align-items: flex-end; flex-direction: column; }
        .header-center { flex: 1.5 1 0; text-align: center; }

        #player-name { font-size: 14px; font-weight: bold; color: #aaa; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }

        #balance-display { font-size: clamp(20px, 5vw, 28px); font-weight: 900; color: var(--text); text-shadow: 0 0 10px rgba(255,255,255,0.3); white-space: nowrap; }
        
        .reb-count { font-size: 8px; font-weight: bold; color: var(--gold); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 2px; white-space: nowrap;}
        #reb-label { font-weight: 900; font-size: 12px; background: rgba(255, 215, 0, 0.2); padding: 2px 8px; border-radius: 10px; border: 1px solid var(--gold); }

        /* --- 3D COIN --- */
        .stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; min-height: 50vh; position: relative; }
        
        #coin-container { 
            width: 200px; height: 200px; position: relative; z-index: 50; 
        }
        
        #coin {
            width: 100%; height: 100%; position: absolute;
            transform-style: preserve-3d; cursor: pointer; transition: transform 0.1s ease-out;
            transform: rotateX(15deg) rotateY(15deg); 
        }
        #coin:active { transform: scale(0.95); }

        .coin-face {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 100px; font-weight: 900; color: rgba(0,0,0,0.7);
            backface-visibility: hidden; border: 3px solid rgba(255,255,255,0.3);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #cd7f32, #8b4513);
            background-size: cover; background-position: center;
        }
        .front { transform: translateZ(20px); }
        .back  { transform: rotateY(180deg) translateZ(0px); }
        .coin-layer {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: #8b4513; border: 2px solid rgba(0,0,0,0.1); pointer-events: none;
            background-size: cover; background-position: center;
        }

        /* --- SYMMETRICAL UI BOTTOM --- */
        .bottom-ui { width: 100%; max-width: 500px; padding: 20px; z-index: 10; display: flex; flex-direction: column; gap: 20px; }
        
        .bars-container { display: flex; flex-direction: column; gap: 10px; }
        
        .energy-block { width: 100%; text-align: center; }
        .energy-text { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #aaa; letter-spacing: 1px; }
        .bar-wrap { width: 100%; height: 16px; background: #111; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #ff8c00, #ff0000); width: 100%; transition: width 0.2s; }
        
        /* NITRO BAR */
        .nitro-fill { height: 100%; background: linear-gradient(90deg, #da70d6, var(--nitro)); width: 0%; transition: width 0.1s linear; }
        .nitro-active-fx { box-shadow: 0 0 40px var(--nitro), inset 0 0 20px var(--nitro) !important; border-color: #fff !important; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            background: var(--panel); border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; color: #fff;
            font-weight: 900; font-size: 12px; text-transform: uppercase;
            text-align: center; cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn:active { transform: scale(0.95); background: #222; }
        .btn-full { grid-column: span 2; }
        .btn-accent { border-color: var(--accent); color: var(--accent); }
        .btn-gold { border-color: var(--gold); color: var(--gold); }
        .btn-purple { border-color: #9b59b6; color: #9b59b6; }

        /* --- MODALS --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: none; z-index: 2000; flex-direction: column; padding: 20px;
            animation: fadeIn 0.3s forwards;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border); margin-bottom: 15px; flex-shrink: 0; }
        .close-btn { background: none; border: none; color: #fff; font-size: 28px; font-weight: bold; cursor: pointer; }
        
        .content { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        
        .item { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .buy { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 900; font-size: 12px; cursor: pointer; }
        .buy:disabled { opacity: 0.5; cursor: not-allowed; }
        .buy:active:not(:disabled) { transform: scale(0.9); }

        /* --- FOTRUNE WHEEL --- */
        .wheel-wrapper { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        .wheel-pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 40px; background: #d00000; z-index: 10;
            clip-path: polygon(50% 100%, 0 0, 100% 0); border-radius: 5px 5px 0 0;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
        }
        .wheel-pointer::before { content:''; position:absolute; top:0; left:0; right:0; height:20px; background:#ff0000; border-radius:50%; }
        
        .wheel-outer { width: 100%; height: 100%; border-radius: 50%; background: #e6e6e6; border: 4px solid #333; padding: 12px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.8); position: relative; }
        .wheel-spin-area {
            width: 100%; height: 100%; border-radius: 50%; border: 6px solid #ffd700; position: relative; overflow: hidden;
            background: conic-gradient(#7bc02b 0deg 45deg, #fce92b 45deg 90deg, #f28e1c 90deg 135deg, #e8252a 135deg 180deg, #e21783 180deg 225deg, #852899 225deg 270deg, #1a459b 270deg 315deg, #1bb2e0 315deg 360deg);
            transition: transform 4s cubic-bezier(0.1, 2.7, 0.2, 1); box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        .wheel-spin-area::before { content: ''; position: absolute; inset: 0; border-radius: 50%; background: repeating-conic-gradient(from -0.5deg, transparent 0deg, transparent 44deg, #333 44deg, #333 45deg); }
        .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: #ffd700; border-radius: 50%; z-index: 5; border: 2px solid #b8860b; box-shadow: 0 0 15px rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; }
        .wheel-center-inner { width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle at 50% 30%, #4db8ff, #0056b3); border: 3px solid #003d82; box-shadow: inset 0 -5px 10px rgba(0,0,0,0.5), inset 0 5px 10px rgba(255,255,255,0.5); }
        .wheel-legend { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 10px; text-align: left; }
        .legend-item { background: #222; padding: 5px 10px; border-radius: 5px; border-left: 3px solid; display: flex; justify-content: space-between; }
        .dot { position: absolute; width: 8px; height: 8px; background: radial-gradient(circle, #fff, #aaa); border-radius: 50%; box-shadow: 0 0 4px #000; }

        .floating { position: absolute; pointer-events: none; animation: floatUp 0.8s ease-out forwards; font-weight: 900; font-size: 28px; z-index: 5000; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-100px) scale(1.5); } }
        
        .particle { position: absolute; pointer-events: none; border-radius: 50%; z-index: 4000; box-shadow: 0 0 8px currentColor; animation: popParticle 0.6s ease-out forwards; }
        @keyframes popParticle { 0% { transform: scale(1) translate(0,0); opacity: 1; } 100% { transform: scale(0) translate(var(--tx), var(--ty)); opacity: 0; } }

        .nick-input { width: 100%; padding: 15px; background: #111; color: #fff; border: 2px solid var(--accent); border-radius: 12px; text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 20px; }
        
        /* --- ROULETTE CS2 STYLES --- */
        .roulette-wrap { width: 100%; height: 130px; border: 2px solid var(--border); position: relative; overflow: hidden; background: #111; margin: 20px 0; border-radius: 8px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .roulette-tape { display: flex; height: 100%; transition: transform 10s cubic-bezier(0.1, 0, 0.1, 1); }
        .r-item { width: 110px; height: 100%; flex-shrink: 0; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; text-align:center; padding: 5px; background: #1a1a1a; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);}
        .r-pointer { position: absolute; top: 0; bottom: 0; left: 50%; width: 4px; background: #e74c3c; z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px #e74c3c;}
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div id="player-name">ИГРОК</div>
    </div>
    <div class="header-center">
        <div id="balance-display">0</div>
    </div>
    <div class="header-right">
        <div class="reb-count">ПЕРЕРОЖДЕНИЯ</div>
        <div id="reb-label">0</div>
    </div>
</header>

<div class="stage">
    <div id="coin-container">
        <div id="coin" onpointerdown="Game.tap(event)">
            <div class="coin-face front" id="coin-face-f">N</div>
            <div class="coin-face back" id="coin-face-b">N</div>
        </div>
    </div>
</div>

<div class="bottom-ui">
    <div class="bars-container">
        <div class="energy-block">
            <div class="energy-text">ЭНЕРГИЯ: <span id="v-nrg" style="color:#fff">250/250</span></div>
            <div class="bar-wrap"><div id="f-nrg" class="bar-fill"></div></div>
        </div>
        <div class="energy-block">
            <div class="energy-text" id="nitro-text">НИТРО: <span id="v-nitro" style="color:var(--nitro)">0%</span></div>
            <div class="bar-wrap" id="nitro-wrap">
                <div id="f-nitro" class="nitro-fill"></div>
            </div>
        </div>
    </div>

    <div class="btn-grid">
        <div class="btn" onclick="UI.open('shop')">МАГАЗИН</div>
        <div class="btn btn-gold" onclick="UI.open('wheel')">КОЛЕСО</div>
        <div class="btn btn-full btn-purple" onclick="UI.open('cases')">КЕЙСЫ УЛУЧШЕНИЙ</div>
        <div class="btn" onclick="UI.open('ach')">УСПЕХИ</div>
        <div class="btn" onclick="UI.open('promo')">ПРОМОКОДЫ</div>
        <div class="btn btn-full btn-accent" onclick="UI.open('reb')">СДЕЛАТЬ ПЕРЕРОЖДЕНИЕ</div>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-header">
        <h2 id="m-title" style="margin:0; text-transform:uppercase;">МЕНЮ</h2>
        <button class="close-btn" id="m-close" onclick="UI.close()">×</button>
    </div>
    <div class="content" id="m-body"></div>
</div>

<div style="position:fixed; bottom:5px; right:5px; font-size:10px; color:#555; z-index:9999;">
    <a href="https://t.me/KINETIK_k" style="color:#555; text-decoration:none;">KINETIK</a> | v 1.6
</div>

<script>
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F5' || (e.ctrlKey && (e.key === 'r' || e.key === 'R'))) {
            e.preventDefault();
        }
    });
    window.addEventListener('beforeunload', function (e) {
        Game.save();
        e.preventDefault();
        e.returnValue = ''; 
    });

    const Sounds = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        play(type) {
            if (this.ctx.state === 'suspended') this.ctx.resume();
            const o = this.ctx.createOscillator(), g = this.ctx.createGain();
            o.connect(g); g.connect(this.ctx.destination);
            
            if(type==='tap') { o.type='sine'; o.frequency.setTargetAtTime(400, this.ctx.currentTime, 0.02); g.gain.setValueAtTime(0.2, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1); o.start(); o.stop(this.ctx.currentTime + 0.1); }
            if(type==='buy') { o.type='square'; o.frequency.setValueAtTime(400, this.ctx.currentTime); o.frequency.linearRampToValueAtTime(800, this.ctx.currentTime+0.1); g.gain.setValueAtTime(0.05, this.ctx.currentTime); g.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.15); o.start(); o.stop(this.ctx.currentTime + 0.15); }
            if(type==='error') { o.type='sawtooth'; o.frequency.setValueAtTime(100, this.ctx.currentTime); g.gain.setValueAtTime(0.1, this.ctx.currentTime); g.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.2); o.start(); o.stop(this.ctx.currentTime + 0.2); }
            if(type==='tick') { o.type='triangle'; o.frequency.setValueAtTime(800, this.ctx.currentTime); g.gain.setValueAtTime(0.05, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05); o.start(); o.stop(this.ctx.currentTime + 0.05); }
            if(type==='win') { o.type='sine'; o.frequency.setValueAtTime(400, this.ctx.currentTime); o.frequency.linearRampToValueAtTime(600, this.ctx.currentTime+0.2); o.frequency.linearRampToValueAtTime(1000, this.ctx.currentTime+0.4); g.gain.setValueAtTime(0.1, this.ctx.currentTime); g.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime+0.6); o.start(); o.stop(this.ctx.currentTime+0.6); }
            if(type==='nitro') { o.type='sawtooth'; o.frequency.setValueAtTime(200, this.ctx.currentTime); o.frequency.exponentialRampToValueAtTime(900, this.ctx.currentTime+0.5); g.gain.setValueAtTime(0.15, this.ctx.currentTime); g.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime+1); o.start(); o.stop(this.ctx.currentTime+1); }
        }
    };

    const CaseConfig = {
        1: { name: "Кейс Усиления Клика", img: "11.png", dropImg: "14.png", cost: 150000, type: 'click', 
             drops: [{v:1, c:60, n:'1x'}, {v:2, c:40, n:'2x'}, {v:3, c:30, n:'3x'}, {v:4, c:5, n:'4x'}, {v:5, c:0.1, n:'5x'}] },
        2: { name: "Кейс Автодохода", img: "12.png", dropImg: "15.png", cost: 300000, type: 'auto',
             drops: [{v:1, c:60, n:'1x'}, {v:2, c:40, n:'2x'}, {v:3, c:30, n:'3x'}, {v:4, c:5, n:'4x'}, {v:5, c:0.1, n:'5x'}] },
        3: { name: "Кейс Быстрого Нитро", img: "13.png", dropImg: "16.png", cost: 700000, type: 'nitro',
             drops: [{v:25, c:60, n:'25 сек'}, {v:20, c:40, n:'20 сек'}, {v:15, c:30, n:'15 сек'}, {v:10, c:5, n:'10 сек'}, {v:5, c:0.1, n:'5 сек'}] }
    };

    const Game = {
        nickname: "", score: 0, total: 0, pC: 1, pS: 0, nrg: 250, maxNrg: 250, reb: 0,
        
        nitroTimer: 0, maxNitroTimer: 30,
        nitroClicks: 0, maxNitroClicks: 100,
        activeTimer: 0, maxActiveTimer: 7,
        isNitroActive: false,

        lastClickTime: 0, lastSpin: 0, extraSpins: 0,

        inventory: [], activeClickMult: 1, activeAutoMult: 1, activeNitroCD: 30,

        upgrades: [
            {id:0, n:"Click Force", d:"Улучшить клик", c:200, p:2, s:0},
            {id:1, n:"Auto Miner", d:"Пассивный доход", c:3000, p:0, s:30},
            {id:2, n:"Core Engine", d:"Мощная ферма", c:80000, p:0, s:400},
            {id:3, n:"Master Link", d:"Мега клик", c:700000, p:300, s:0}
        ],

        init() {
            this.load();
            this.buildCoinEdges();

            // Жесткий сброс баффов, если инвентарь пустой (чиним баг со старыми сохранениями)
            if (this.inventory.length === 0) {
                this.activeClickMult = 1;
                this.activeAutoMult = 1;
                this.activeNitroCD = 30;
            }
            
            this.maxNitroTimer = this.activeNitroCD; 

            // Надежная проверка никнейма
            if (!this.nickname || this.nickname.trim() === "") {
                this.nickname = "";
                setTimeout(() => UI.open('login'), 300);
            } else {
                document.getElementById('player-name').innerText = this.nickname;
            }
            
            this.update();
            
            setInterval(() => {
                if(this.pS > 0) { let g = this.pS * (this.reb + 1) * this.activeAutoMult; this.score += g; this.total += g; }
                if(this.nrg < this.maxNrg) this.nrg = Math.min(this.maxNrg, this.nrg + 0.5);
                
                if(this.isNitroActive) {
                    this.activeTimer -= 1;
                    if(this.activeTimer <= 0) {
                        this.isNitroActive = false;
                        this.nitroTimer = 0; 
                        this.nitroClicks = 0; 
                        document.getElementById('coin-face-f').classList.remove('nitro-active-fx');
                        document.getElementById('coin-face-b').classList.remove('nitro-active-fx');
                    }
                } else {
                    if(this.nitroTimer < this.maxNitroTimer) {
                        this.nitroTimer += 1;
                    }
                }
                
                this.update();
                this.save();
            }, 1000);
        },

        buildCoinEdges() {
            const coin = document.getElementById('coin');
            for(let i=1; i<20; i++) {
                let layer = document.createElement('div');
                layer.className = 'coin-layer';
                layer.style.transform = `translateZ(${i}px)`;
                coin.appendChild(layer);
            }
        },

        spawnParticles(x, y) {
            const count = this.isNitroActive ? 8 : 4;
            const color = this.isNitroActive ? '#a020f0' : '#ffd700';
            for(let i=0; i<count; i++) {
                let p = document.createElement('div'); p.className = 'particle';
                let size = Math.random() * 6 + 4;
                p.style.width = size + 'px'; p.style.height = size + 'px';
                p.style.background = color; p.style.color = color;
                p.style.left = x + 'px'; p.style.top = y + 'px';
                let angle = Math.random() * Math.PI * 2; let velocity = Math.random() * 50 + 50;
                p.style.setProperty('--tx', `${Math.cos(angle) * velocity}px`); p.style.setProperty('--ty', `${Math.sin(angle) * velocity}px`);
                document.body.appendChild(p); setTimeout(() => p.remove(), 600);
            }
        },

        tap(e) {
            if(!e.isTrusted) return; 
            let now = Date.now();
            if(now - this.lastClickTime < 40) return; 
            this.lastClickTime = now;

            if(this.nrg < 1) { Sounds.play('error'); return; }
            
            if(!this.isNitroActive && this.nitroTimer >= this.maxNitroTimer) {
                this.nitroClicks++;
                if(this.nitroClicks >= this.maxNitroClicks) {
                    Logic.activateNitro(); 
                }
            }

            let multiplier = this.isNitroActive ? 5 : 1;
            let g = (this.pC * (this.reb + 1)) * multiplier * this.activeClickMult;
            
            this.score += g; this.total += g; this.nrg--;
            
            Sounds.play('tap');
            this.pop(e.clientX, e.clientY, `+${Math.floor(g)}`);
            this.spawnParticles(e.clientX, e.clientY);
            this.update();
            
            let cn = document.getElementById('coin');
            cn.style.transform = 'rotateX(15deg) rotateY(15deg) scale(0.95)';
            setTimeout(() => cn.style.transform = 'rotateX(15deg) rotateY(15deg) scale(1)', 50);
        },

        update() {
            document.getElementById('balance-display').innerText = Math.floor(this.score).toLocaleString();
            document.getElementById('reb-label').innerText = this.reb;
            document.getElementById('v-nrg').innerText = Math.floor(this.nrg) + "/" + this.maxNrg;
            document.getElementById('f-nrg').style.width = (this.nrg/this.maxNrg*100) + "%";
            
            let nText = document.getElementById('v-nitro');
            let nFill = document.getElementById('f-nitro');
            
            if(this.isNitroActive) {
                nText.innerText = `АКТИВНО: ${this.activeTimer}с`; 
                nText.style.color = "#fff";
                nFill.style.width = ((this.activeTimer / this.maxActiveTimer) * 100) + "%";
                nFill.style.background = "#fff";
            } else if (this.nitroTimer < this.maxNitroTimer) {
                nText.innerText = `ОТКАТ: ${this.maxNitroTimer - this.nitroTimer}с`; 
                nText.style.color = "var(--nitro)";
                nFill.style.width = ((this.nitroTimer / this.maxNitroTimer) * 100) + "%";
                nFill.style.background = "linear-gradient(90deg, #da70d6, var(--nitro))";
            } else {
                nText.innerText = `КЛИКОВ ДЛЯ НИТРО: ${this.nitroClicks}/${this.maxNitroClicks}`;
                nText.style.color = "var(--gold)";
                nFill.style.width = ((this.nitroClicks / this.maxNitroClicks) * 100) + "%";
                nFill.style.background = "var(--gold)";
            }

            const ff = document.getElementById('coin-face-f'); const fb = document.getElementById('coin-face-b');
            const layers = document.querySelectorAll('.coin-layer');
            
            let bg = "linear-gradient(135deg, #cd7f32, #8b4513)";
            let isImage = false;
            
            if(this.total >= 100000000000) { bg = "url('./8.png')"; isImage = true; } // 100 Млрд
            else if(this.total >= 10000000000) { bg = "url('./7.png')"; isImage = true; } // 10 Млрд
            else if(this.total >= 1000000000) { bg = "linear-gradient(135deg, #9b59b6, #4b0082)"; }
            else if(this.total >= 100000000) { bg = "linear-gradient(135deg, #e74c3c, #4a0000)"; }
            else if(this.total >= 10000000) { bg = "linear-gradient(135deg, #2ecc71, #004d00)"; }
            else if(this.total >= 1000000) { bg = "linear-gradient(135deg, #e0ffff, #00d4ff)"; }
            else if(this.total >= 100000) { bg = "linear-gradient(135deg, #ffd700, #b8860b)"; }
            else if(this.total >= 10000) { bg = "linear-gradient(135deg, #e0e0e0, #7f8c8d)"; }

            if(!this.isNitroActive) { 
                if (isImage) {
                    ff.style.background = `${bg} center/cover no-repeat`; 
                    fb.style.background = `${bg} center/cover no-repeat`;
                    layers.forEach(l => l.style.background = `${bg} center/cover no-repeat`);
                } else {
                    ff.style.background = bg; fb.style.background = bg; 
                    layers.forEach(l => l.style.background = bg); 
                }
            }
        },

        pop(x, y, t) {
            const p = document.createElement('div'); p.className='floating'; p.innerText=t;
            p.style.left=(x-20)+'px'; p.style.top=y+'px'; p.style.color = this.isNitroActive ? '#a020f0' : '#fff';
            document.body.appendChild(p); setTimeout(()=>p.remove(), 800);
        },

        save() { 
            localStorage.setItem('chikizi_sym_save', JSON.stringify({
                nick:this.nickname, s:this.score, t:this.total, c:this.pC, a:this.pS, 
                up:this.upgrades, m:this.maxNrg, r:this.reb, ls:this.lastSpin, 
                es:this.extraSpins, inv:this.inventory, acm:this.activeClickMult, 
                aam:this.activeAutoMult, anc:this.activeNitroCD
            })); 
        },
        load() { 
            let d = JSON.parse(localStorage.getItem('chikizi_sym_save')); 
            if(d) { 
                Object.assign(this, d); 
                this.nickname = d.nick || ""; 
                this.inventory = d.inv || [];
                this.activeClickMult = d.acm || 1;
                this.activeAutoMult = d.aam || 1;
                this.activeNitroCD = d.anc || 30;
            } 
        }
    };

    const UI = {
        open(type) {
            const m = document.getElementById('modal'), b = document.getElementById('m-body'), cBtn = document.getElementById('m-close');
            m.style.display = 'flex'; b.innerHTML = ''; cBtn.style.display = 'block';
            document.getElementById('m-title').innerText = type;
            if(type !== 'login' && type !== 'roulette') Sounds.play('buy');

            if(type==='login') {
                document.getElementById('m-title').innerText = "СОЗДАНИЕ ПРОФИЛЯ";
                cBtn.style.display = 'none';
                b.innerHTML = `
                    <div style="text-align:center; padding-top:20px;">
                        <p style="color:#aaa; margin-bottom:20px;">Введите свой никнейм. Ваши данные будут надежно сохранены в браузере.</p>
                        <input type="text" id="nick-in" class="nick-input" placeholder="Ваш ник..." maxlength="12">
                        <button class="buy" style="width:100%; padding:15px; background:var(--accent); color:#fff;" onclick="Logic.saveNick()">НАЧАТЬ ИГРУ</button>
                    </div>
                `;
            }
            if(type==='cases') {
                document.getElementById('m-title').innerText = "КЕЙСЫ УЛУЧШЕНИЙ CS2";
                
                b.innerHTML = `<button class="buy" style="width:100%; margin-bottom:15px; background:#9b59b6; color:#fff; font-size:14px;" onclick="UI.open('inventory')">📦 ОТКРЫТЬ ИНВЕНТАРЬ</button>`;
                
                [1,2,3].forEach(id => {
                    let c = CaseConfig[id];
                    // Убрали onerror, чтобы картинки не сбрасывались
                    b.innerHTML += `<div class="item" style="border-left: 5px solid #9b59b6">
                        <img src="${c.img}" style="width:60px; height:60px; object-fit:contain; margin-right:15px;">
                        <div style="flex-grow:1;"><b>${c.name}</b><br><span style="color:#aaa; font-size:10px">Нажми, чтобы крутить слоты</span><br><span style="color:var(--gold); font-weight:bold;">${c.cost.toLocaleString()} 🪙</span></div>
                        <button class="buy" onclick="Logic.startRoulette(${id})">ОТКРЫТЬ</button>
                    </div>`;
                });
            }
            if(type==='inventory') {
                document.getElementById('m-title').innerText = "ИНВЕНТАРЬ ЭФФЕКТОВ";
                
                let activeHtml = `<div style="margin-bottom:20px; padding:15px; background:#222; border-radius:8px; border:1px solid #555;">
                    <h4 style="margin-bottom:10px; color:var(--gold); text-align:center;">ВАШИ ТЕКУЩИЕ БАФФЫ:</h4>
                    <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold; color:#fff;">
                        <span>КЛИК: x${Game.activeClickMult}</span>
                        <span>АВТО: x${Game.activeAutoMult}</span>
                        <span>НИТРО: ${Game.activeNitroCD}с</span>
                    </div>
                </div>`;

                let itemsHtml = Game.inventory.map(i => {
                    let isActive = false;
                    if(i.type === 'click' && Game.activeClickMult === i.val) isActive = true;
                    if(i.type === 'auto' && Game.activeAutoMult === i.val) isActive = true;
                    if(i.type === 'nitro' && Game.activeNitroCD === i.val) isActive = true;

                    let actionText = isActive ? "ИСПОЛЬЗУЕТСЯ" : "ПРИМЕНИТЬ";
                    let actionColor = isActive ? "#555" : "var(--accent)";
                    let actionDisabled = isActive ? "disabled" : "";

                    return `<div class="item" style="border-color:${isActive?'var(--accent)':'#333'};">
                        <img src="${i.img}" style="width:50px; height:50px; object-fit:contain; margin-right:15px;">
                        <div style="flex-grow:1;"><b>${i.type === 'click'?'Стрелка Клика':(i.type === 'auto'?'Стрелка Авто':'Таймер Нитро')}</b><br><span style="color:#fff; font-weight:bold;">Дает: ${i.name}</span></div>
                        <button class="buy" style="background:${actionColor}; color:#fff;" ${actionDisabled} onclick="Logic.equipItem('${i.id}')">${actionText}</button>
                    </div>`;
                }).join('');

                if(Game.inventory.length === 0) itemsHtml = `<p style="text-align:center; color:#aaa; margin: 30px 0;">У вас пока нет улучшений. Откройте кейсы!</p>`;

                b.innerHTML = activeHtml + itemsHtml + `<button class="buy" style="width:100%; margin-top:15px;" onclick="UI.open('cases')">НАЗАД К КЕЙСАМ</button>`;
            }
            if(type==='roulette') {
                document.getElementById('m-title').innerText = "ОТКРЫТИЕ КЕЙСА...";
                b.innerHTML = `<div id="r-body"></div>`;
            }
            if(type==='wheel') {
                document.getElementById('m-title').innerText = "КОЛЕСО ФОРТУНЫ";
                
                let now = Date.now();
                let cd = 8 * 60 * 60 * 1000;
                let timePassed = now - Game.lastSpin;
                let canSpin = timePassed >= cd || Game.extraSpins > 0;
                
                let btnHtml = '';
                if(canSpin) {
                    btnHtml = `<button class="buy" style="width:100%; padding:15px; font-size:16px; background:var(--gold);" id="spin-btn" onclick="Logic.spinWheel(this)">ИСПЫТАТЬ УДАЧУ</button>`;
                } else {
                    let left = cd - timePassed;
                    let h = Math.floor(left / 3600000); let min = Math.floor((left % 3600000) / 60000);
                    btnHtml = `<button class="buy" style="width:100%; padding:15px; font-size:16px;" disabled>ЖДИТЕ: ${h}ч ${min}м</button>`;
                }

                let dotsHTML = '';
                for(let i=0; i<12; i++) { let angle = i * 30; dotsHTML += `<div class="dot" style="top:50%; left:50%; margin:-4px 0 0 -4px; transform: rotate(${angle}deg) translateY(-125px);"></div>`; }

                b.innerHTML = `
                    <div style="text-align:center;">
                        <p style="color:#aaa; font-size:12px; margin-bottom:10px;">Доп. прокрутки: <b style="color:#fff">${Game.extraSpins}</b></p>
                        <div class="wheel-wrapper">
                            <div class="wheel-pointer"></div>
                            <div class="wheel-outer">
                                ${dotsHTML}
                                <div class="wheel-spin-area" id="visual-wheel"></div>
                                <div class="wheel-center"><div class="wheel-center-inner"></div></div>
                            </div>
                        </div>
                        <h3 id="wheel-res" style="color:var(--gold); margin: 15px 0;"></h3>
                        ${btnHtml}
                        <div class="wheel-legend">
                            <div class="legend-item" style="border-color:#7bc02b"><span>10 000 🪙</span><b>35%</b></div>
                            <div class="legend-item" style="border-color:#fce92b"><span>5 000 🪙</span><b>20%</b></div>
                            <div class="legend-item" style="border-color:#f28e1c"><span>2 000 🪙</span><b>20%</b></div>
                            <div class="legend-item" style="border-color:#e8252a"><span>JACKPOT (5 сп.)</span><b>2%</b></div>
                            <div class="legend-item" style="border-color:#e21783"><span>50 000 🪙</span><b>10%</b></div>
                            <div class="legend-item" style="border-color:#852899"><span>100 000 🪙</span><b>8%</b></div>
                            <div class="legend-item" style="border-color:#1a459b"><span>250 000 🪙</span><b>4%</b></div>
                            <div class="legend-item" style="border-color:#1bb2e0"><span>500 000 🪙</span><b>1%</b></div>
                        </div>
                    </div>
                `;
            }
            if(type==='shop') {
                document.getElementById('m-title').innerText = "МАГАЗИН";
                Game.upgrades.forEach(u => {
                    b.innerHTML += `<div class="item">
                        <div><b>${u.n}</b><br><span style="color:#aaa; font-size:10px">${u.d}</span><br><span style="color:var(--gold); font-weight:bold;">${u.c.toLocaleString()} 🪙</span></div>
                        <button class="buy" onclick="Logic.buy(${u.id})">КУПИТЬ</button>
                    </div>`;
                });
            }
            if(type==='ach') {
                document.getElementById('m-title').innerText = "УСПЕХИ";
                const data = [
                    {n:"Серебро", v:10000, img:"1.png", col:"#bdc3c7"},
                    {n:"Золото", v:100000, img:"2.png", col:"#f1c40f"},
                    {n:"Алмаз", v:1000000, img:"3.png", col:"#00d4ff"},
                    {n:"Изумруд", v:10000000, img:"4.png", col:"#2ecc71"},
                    {n:"Рубин", v:100000000, img:"5.png", col:"#e74c3c"},
                    {n:"Аметист", v:1000000000, img:"6.png", col:"#9b59b6"},
                    {n:"Белая монета", v:10000000000, img:"7.png", col:"#ffffff"},
                    {n:"Радужная", v:100000000000, img:"8.png", col:"#ff00ff"}
                ];
                data.forEach(a => {
                    let ok = Game.total >= a.v;
                    let iconHtml = `<div style="width:45px;height:45px;background:${a.col}20;border:2px solid ${ok?a.col:'#333'};border-radius:8px;margin-right:15px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 0 10px ${ok?a.col+'80':'transparent'};">
                        ${ok ? `<img src="${a.img}" alt="ach" style="width:100%;height:100%;object-fit:cover;">` : '<span style="font-size:24px">🔒</span>'}
                    </div>`;

                    b.innerHTML += `<div class="item" style="${ok?'border-color:'+a.col:''}">
                        <div style="display:flex; align-items:center;">
                            ${iconHtml}
                            <span style="color:${ok?'#fff':'#555'}; font-weight:bold;">${ok ? a.n : 'Секрет'}</span>
                        </div>
                        <b style="color:${ok?a.col:'#555'}">${ok?'ПОЛУЧЕНО':a.v.toLocaleString()}</b>
                    </div>`;
                });
            }
            if(type==='reb') {
                document.getElementById('m-title').innerText = "ПЕРЕРОЖДЕНИЕ";
                let cost = Math.pow(10, 6 + Game.reb);
                b.innerHTML = `<div style="text-align:center; padding: 20px;">
                    <p style="color:#aaa; margin-bottom:20px;">Сброс прогресса, инвентаря и всех баффов! Множитель дохода увеличивается навсегда!</p>
                    <h2 style="color:var(--gold); font-size:40px;">x${Game.reb+2}</h2>
                    <p style="margin: 20px 0;">Цена: <b>${cost.toLocaleString()}</b> 🪙</p>
                    <button class="buy" style="width:100%; padding:15px; background:var(--accent); color:#fff;" onclick="Logic.rebirth()">ПОДТВЕРДИТЬ</button>
                </div>`;
            }
            if(type==='promo') {
                document.getElementById('m-title').innerText = "ПРОМОКОДЫ";
                b.innerHTML = `
                    <div style="padding: 20px; text-align:center;">
                        <input id="p-in" type="text" placeholder="Введите код..." class="nick-input">
                        <button class="buy" style="width:100%;padding:15px;" onclick="Logic.promo()">АКТИВИРОВАТЬ</button>
                    </div>
                `;
            }
        },
        close() { document.getElementById('modal').style.display='none'; Sounds.play('error'); Game.save(); }
    };

    const Logic = {
        wheelDegree: 0,
        isSpinning: false,
        
        saveNick() {
            let val = document.getElementById('nick-in').value.trim();
            if(val.length > 0) { Game.nickname = val; document.getElementById('player-name').innerText = val; UI.close(); Sounds.play('win'); Game.save(); }
            else Sounds.play('error');
        },

        activateNitro() {
            Game.isNitroActive = true;
            Game.activeTimer = Game.maxActiveTimer; 
            Sounds.play('nitro');
            document.getElementById('coin-face-f').classList.add('nitro-active-fx');
            document.getElementById('coin-face-b').classList.add('nitro-active-fx');
        },

        buy(id) {
            let u = Game.upgrades[id];
            if(Game.score >= u.c) { Game.score -= u.c; Game.pC += u.p; Game.pS += u.s; u.c = Math.floor(u.c*2.8); Sounds.play('buy'); UI.open('shop'); Game.update(); Game.save(); } else Sounds.play('error');
        },
        
        startRoulette(id) {
            let cfg = CaseConfig[id];
            if(Game.score < cfg.cost) { Sounds.play('error'); return; }
            Game.score -= cfg.cost; Game.update(); Game.save();
            
            let getDrop = () => {
                let total = cfg.drops.reduce((a,b)=>a+b.c, 0);
                let r = Math.random() * total;
                let sum = 0;
                for(let d of cfg.drops) {
                    sum += d.c;
                    if(r <= sum) return d;
                }
                return cfg.drops[0];
            };

            let tapeItems = [];
            for(let i=0; i<60; i++) tapeItems.push(getDrop());
            let winner = tapeItems[50]; 

            UI.open('roulette');
            document.getElementById('m-close').style.display = 'none'; 

            let rb = document.getElementById('r-body');
            let tapeHtml = tapeItems.map(d => `<div class="r-item">
                <img src="${cfg.dropImg}" style="width:50px; height:50px; object-fit:contain; margin-bottom:5px;">
                <br><span style="color:#fff">${d.n}</span>
            </div>`).join('');
            
            rb.innerHTML = `
                <div class="roulette-wrap" id="r-wrap">
                    <div class="r-pointer"></div>
                    <div class="roulette-tape" id="r-tape">${tapeHtml}</div>
                </div>
                <button class="buy" id="r-claim" style="display:none; width:100%; background:var(--accent); color:#fff; padding: 15px; font-size:14px;" onclick="Logic.claimItem(${id}, ${winner.v}, '${winner.n}')">ЗАБРАТЬ В ИНВЕНТАРЬ</button>
            `;

            setTimeout(() => {
                let tape = document.getElementById('r-tape');
                let itemWidth = 110;
                let wrapWidth = document.getElementById('r-wrap').offsetWidth;
                let targetX = (50 * itemWidth + itemWidth/2) - (wrapWidth / 2);
                
                let rndOffset = (Math.random() - 0.5) * 80;
                targetX += rndOffset;

                tape.style.transform = `translateX(-${targetX}px)`;
                Sounds.play('buy');

                setTimeout(() => {
                    document.getElementById('r-claim').style.display = 'block';
                    document.getElementById('m-title').innerText = `ВЫПАЛО: ${winner.n}!`;
                    Sounds.play('win');
                }, 10000); 
            }, 100);
        },

        claimItem(id, val, name) {
            let type = CaseConfig[id].type;
            let img = CaseConfig[id].dropImg;
            Game.inventory.push({ type, val, name, img, id: Date.now() + Math.random().toString() });
            Game.save();
            UI.open('inventory');
        },

        equipItem(id) {
            let item = Game.inventory.find(i => i.id == id);
            if(item) {
                if(item.type === 'click') Game.activeClickMult = item.val;
                if(item.type === 'auto') Game.activeAutoMult = item.val;
                if(item.type === 'nitro') { 
                    Game.activeNitroCD = item.val; 
                    Game.maxNitroTimer = item.val; 
                    if(Game.nitroTimer > Game.maxNitroTimer) Game.nitroTimer = Game.maxNitroTimer; 
                }
                Game.save();
                Game.update();
                Sounds.play('buy');
                UI.open('inventory'); 
            }
        },

        rebirth() {
            let cost = Math.pow(10, 6 + Game.reb);
            if(Game.score >= cost) { 
                Game.reb++; Game.score=0; Game.pC=1; Game.pS=0; 
                Game.upgrades.forEach(u=>u.c=u.id==0?200:(u.id==1?3000:(u.id==2?80000:700000))); 
                
                Game.inventory = [];
                Game.activeClickMult = 1;
                Game.activeAutoMult = 1;
                Game.activeNitroCD = 30;
                Game.maxNitroTimer = 30;
                Game.nitroTimer = 30;
                Game.isNitroActive = false;

                Sounds.play('win'); UI.close(); Game.update(); Game.save(); 
            } else Sounds.play('error');
        },
        promo() {
            let c = document.getElementById('p-in').value;
            const codes = {
                "08694519":10000, 
                "086945191":100000, 
                "086945192":1000000, 
                "086945193":10000000, 
                "086945195":100000000,
                "086945196":10000000000,
                "086945197":100000000000
            };
            if(codes[c]) { Game.score += codes[c]; Game.total += codes[c]; Sounds.play('win'); UI.close(); Game.update(); Game.save(); } else Sounds.play('error');
        },
        
        spinWheel(btn) {
            if(this.isSpinning) return;
            let now = Date.now();
            let cd = 8 * 60 * 60 * 1000;
            if(now - Game.lastSpin < cd && Game.extraSpins <= 0) { Sounds.play('error'); return; }

            this.isSpinning = true; btn.disabled = true;
            if (Game.extraSpins > 0) Game.extraSpins--; else Game.lastSpin = now;
            Game.save();

            const prizes = [
                { val: 10000, chance: 35, idx: 0 }, { val: 5000, chance: 20, idx: 1 },
                { val: 2000, chance: 20, idx: 2 }, { val: "JACKPOT", chance: 2, idx: 3 },
                { val: 50000, chance: 10, idx: 4 }, { val: 100000, chance: 8, idx: 5 },
                { val: 250000, chance: 4, idx: 6 }, { val: 500000, chance: 1, idx: 7 }
            ];
            
            let rand = Math.random() * 100;
            let cumulative = 0; let winObj = prizes[0];
            for (let p of prizes) { cumulative += p.chance; if (rand <= cumulative) { winObj = p; break; } }

            let result = winObj.val; let winIdx = winObj.idx;
            
            let randomOffset = Math.floor(Math.random() * 35) + 5; 
            let targetRot = 360 * 5 + (360 - (winIdx * 45)) - randomOffset; 
            this.wheelDegree += targetRot;

            let w = document.getElementById('visual-wheel');
            let resEl = document.getElementById('wheel-res');
            resEl.innerText = "КРУТИМ...";
            w.style.transform = `rotate(${this.wheelDegree}deg)`;

            let ticks = 0;
            let tickInterval = setInterval(() => { Sounds.play('tick'); ticks++; if(ticks > 25) clearInterval(tickInterval); }, 150);

            setTimeout(() => {
                Sounds.play('win');
                resEl.innerText = result === "JACKPOT" ? "ДЖЕКПОТ! +5 СПИНОВ" : `ВЫИГРЫШ: +${result.toLocaleString()}`;
                if(result === "JACKPOT") Game.extraSpins += 5; else { Game.score += result; Game.total += result; }
                
                Game.update(); Game.save();
                this.isSpinning = false; btn.disabled = false;
                if(Game.extraSpins <= 0) { btn.disabled = true; btn.innerText = "ЖДИТЕ 8 ЧАСОВ"; btn.style.background = "#fff"; }
            }, 4000);
        }
    };

    Game.init();
</script>
</body>
</html>
