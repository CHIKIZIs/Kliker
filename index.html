<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHIKIZICOIN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --accent: #ff4500; --accent-glow: rgba(255, 69, 0, 0.5);
            --bg: #0d0d0d; --panel: #1a1a1a; --border: #333;
            --text: #ffffff; --gold: #ffd700;
            --nitro: #a020f0; --nitro-glow: rgba(160, 32, 240, 0.5);
            --bar-bg: #111;
        }

        /* --- VOID (QUANTUM) DIMENSION VARIABLES --- */
        body.void-dim {
            --bg: #030008; 
            --panel: rgba(15, 10, 30, 0.65); 
            --border: #4d0099;
            --text: #e0d0ff; 
            --accent: #00e5ff; 
            --gold: #b366ff;
            --nitro: #00e5ff;
            background: radial-gradient(circle at 50% 0%, #1a0b2e 0%, #030008 100%);
        }

        html, body { overscroll-behavior-y: contain; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; user-select: none; margin: 0; padding: 0; }
        
        body {
            background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif;
            min-height: 100vh; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column;
            align-items: center; perspective: 1200px; padding-bottom: 50px; transition: background 0.8s ease, color 0.5s;
        }

        /* --- HEADER --- */
        header {
            width: 100%; padding: 10px 15px; background: var(--panel);
            border-bottom: 2px solid var(--border); display: flex;
            justify-content: space-between; align-items: center; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: sticky; top: 0;
            flex-wrap: nowrap; gap: 5px; transition: all 0.5s;
        }

        body.void-dim header {
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0, 229, 255, 0.1);
        }

        .header-left, .header-right { flex: 1 1 0; display: flex; overflow: hidden; }
        .header-left { justify-content: flex-start; align-items: center; gap: 8px; }
        .header-right { justify-content: flex-end; align-items: flex-end; flex-direction: column; }
        .header-center { flex: 1.5 1 0; text-align: center; }

        #player-name { font-size: 14px; font-weight: bold; color: #aaa; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
        body.void-dim #player-name { color: #8870b3; }

        #balance-display { font-size: clamp(20px, 5vw, 28px); font-weight: 900; color: var(--text); text-shadow: 0 0 10px rgba(255,255,255,0.3); white-space: nowrap; transition: color 0.5s;}
        body.void-dim #balance-display { text-shadow: 0 0 15px var(--accent); }

        .reb-count { font-size: 8px; font-weight: bold; color: var(--gold); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 2px; white-space: nowrap;}
        #reb-label { font-weight: 900; font-size: 12px; background: rgba(255, 215, 0, 0.2); padding: 2px 8px; border-radius: 10px; border: 1px solid var(--gold); transition: all 0.5s; }

        body.void-dim .reb-count { color: var(--gold); }
        body.void-dim #reb-label { background: rgba(179, 102, 255, 0.15); border-color: var(--gold); color: var(--accent); }

        /* --- 3D COIN --- */
        .stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; min-height: 45vh; position: relative; }
        
        #coin-container { width: 200px; height: 200px; position: relative; z-index: 50; }
        
        #coin {
            width: 100%; height: 100%; position: absolute;
            transform-style: preserve-3d; cursor: pointer; transition: transform 0.1s ease-out;
            transform: rotateX(15deg) rotateY(15deg); 
        }
        #coin:active { transform: scale(0.95); }

        .coin-face {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 100px; font-weight: 900; color: rgba(0,0,0,0.7);
            backface-visibility: hidden; border: 3px solid rgba(255,255,255,0.3);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #cd7f32, #8b4513);
            background-size: cover; background-position: center;
            transition: all 0.5s ease;
        }
        .front { transform: translateZ(20px); }
        .back  { transform: rotateY(180deg) translateZ(0px); }
        .coin-layer {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: #8b4513; border: 2px solid rgba(0,0,0,0.1); pointer-events: none;
            background-size: cover; background-position: center;
            transition: all 0.5s ease;
        }

        /* --- АНИМАЦИЯ ТРЯСКИ МОНЕТКИ --- */
        @keyframes coinShake {
            0% { transform: rotateX(15deg) rotateY(15deg) scale(0.95) translate(3px, 1px); }
            25% { transform: rotateX(15deg) rotateY(15deg) scale(0.95) translate(-3px, -2px); }
            50% { transform: rotateX(15deg) rotateY(15deg) scale(0.95) translate(2px, 3px); }
            75% { transform: rotateX(15deg) rotateY(15deg) scale(0.95) translate(-2px, 1px); }
            100% { transform: rotateX(15deg) rotateY(15deg) scale(1) translate(0, 0); }
        }

        /* --- QUANTUM SINGULARITY COIN (VOID) --- */
        body.void-dim .coin-face {
            background: #010005; /* Практически черная дыра в центре */
            color: #fff;
            text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent), 0 0 40px var(--gold);
            border: 2px solid rgba(0, 229, 255, 0.4);
            box-shadow: 
                inset 0 0 50px rgba(77, 0, 153, 0.8),
                0 0 30px rgba(0, 229, 255, 0.3),
                0 0 70px rgba(179, 102, 255, 0.3);
            animation: singularityPulse 3s infinite alternate ease-in-out;
        }
        /* Делаем слои прозрачными светящимися кольцами (эффект голограммы/каркаса) */
        body.void-dim .coin-layer { 
            background: transparent; 
            border: 1px solid rgba(0, 229, 255, 0.15); 
            box-shadow: 0 0 5px rgba(179, 102, 255, 0.1);
        }
        
        @keyframes singularityPulse {
            0% { 
                box-shadow: inset 0 0 30px #4d0099, 0 0 15px rgba(0, 229, 255, 0.3), 0 0 40px rgba(179, 102, 255, 0.1); 
                border-color: rgba(0, 229, 255, 0.3); 
            }
            100% { 
                box-shadow: inset 0 0 70px #b366ff, 0 0 35px rgba(0, 229, 255, 0.7), 0 0 90px rgba(179, 102, 255, 0.5); 
                border-color: rgba(0, 229, 255, 0.9); 
            }
        }

        /* --- SYMMETRICAL UI BOTTOM --- */
        .bottom-ui { width: 100%; max-width: 500px; padding: 20px; z-index: 10; display: flex; flex-direction: column; gap: 20px; transition: all 0.5s; }
        
        .bars-container { display: flex; flex-direction: column; gap: 10px; }
        
        .energy-block { width: 100%; text-align: center; }
        .energy-text { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #aaa; letter-spacing: 1px; transition: color 0.5s; }
        .bar-wrap { width: 100%; height: 16px; background: var(--bar-bg); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; position: relative; transition: all 0.3s;}
        .bar-fill { height: 100%; background: linear-gradient(90deg, #ff8c00, #ff0000); width: 100%; transition: width 0.2s, background 0.3s; }
        
        body.void-dim .bar-wrap { background: rgba(5, 2, 16, 0.8); border-color: var(--border); box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }

        .nitro-fill { height: 100%; background: linear-gradient(90deg, #da70d6, var(--nitro)); width: 0%; transition: width 0.1s linear; }
        .nitro-active-fx { box-shadow: 0 0 40px var(--nitro), inset 0 0 20px var(--nitro) !important; border-color: #fff !important; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            background: var(--panel); border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; color: #fff;
            font-weight: 900; font-size: 12px; text-transform: uppercase;
            text-align: center; cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        body.void-dim .btn { backdrop-filter: blur(8px); }
        .btn:active { transform: scale(0.95); background: #222; }
        .btn-full { grid-column: span 2; }
        .btn-accent { border-color: var(--accent); color: var(--accent); }
        .btn-gold { border-color: var(--gold); color: var(--gold); }
        .btn-purple { border-color: #9b59b6; color: #9b59b6; }
        
        .dim-btn-wrap { margin-top: 10px; display: none; }
        body.void-dim .dim-btn-wrap { display: block; }
        
        /* Кнопка портала */
        .btn-portal { 
            background: #000; border: 2px solid var(--accent); color: var(--text); 
            text-shadow: 0 0 10px var(--accent); box-shadow: 0 0 20px rgba(0,229,255,0.3); 
            animation: pulsePortal 2.5s infinite; 
        }
        @keyframes pulsePortal { 
            0% { box-shadow: 0 0 10px rgba(179,102,255,0.3); } 
            50% { box-shadow: 0 0 35px rgba(0,229,255,0.7); } 
            100% { box-shadow: 0 0 10px rgba(179,102,255,0.3); } 
        }

        /* --- MODALS --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: none; z-index: 2000; flex-direction: column; padding: 20px;
            animation: fadeIn 0.3s forwards;
        }
        body.void-dim .modal { background: rgba(3, 0, 8, 0.85); backdrop-filter: blur(15px); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border); margin-bottom: 15px; flex-shrink: 0; }
        .close-btn { background: none; border: none; color: #fff; font-size: 28px; font-weight: bold; cursor: pointer; }
        
        .content { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        
        .item { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s; }
        .buy { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 900; font-size: 12px; cursor: pointer; transition: 0.2s;}
        
        body.void-dim .item { backdrop-filter: blur(5px); }
        body.void-dim .buy { background: var(--accent); color: #000; box-shadow: 0 0 10px rgba(0,229,255,0.4); }
        .buy:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none !important;}
        .buy:active:not(:disabled) { transform: scale(0.9); }

        /* --- EFFECTS --- */
        .floating { position: absolute; pointer-events: none; animation: floatUp 0.8s ease-out forwards; font-weight: 900; font-size: 28px; z-index: 5000; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-100px) scale(1.5); } }
        
        .particle { position: absolute; pointer-events: none; border-radius: 50%; z-index: 4000; box-shadow: 0 0 8px currentColor; animation: popParticle 0.6s ease-out forwards; }
        @keyframes popParticle { 0% { transform: scale(1) translate(0,0); opacity: 1; } 100% { transform: scale(0) translate(var(--tx), var(--ty)); opacity: 0; } }

        .nick-input { width: 100%; padding: 15px; background: #111; color: #fff; border: 2px solid var(--accent); border-radius: 12px; text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 20px; }
        body.void-dim .nick-input { background: rgba(0,0,0,0.5); border-color: var(--gold); }
        
        /* --- ACHIEVEMENT POPUP --- */
        #ach-popup {
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%) scale(0.5);
            background: rgba(20,20,20,0.95); border: 3px solid var(--gold); border-radius: 20px;
            padding: 30px; text-align: center; z-index: 9999; opacity: 0; pointer-events: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px var(--gold);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #ach-popup.show { opacity: 1; transform: translateX(-50%) scale(1); pointer-events: auto; }
        .ach-glitter { position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px #fff; animation: glitter 1s infinite alternate; }
        @keyframes glitter { 0% { transform: scale(0.5); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 1; } }

        /* --- FOTRUNE WHEEL & ROULETTE --- */
        .wheel-wrapper { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 30px; height: 40px; background: #d00000; z-index: 10; clip-path: polygon(50% 100%, 0 0, 100% 0); border-radius: 5px 5px 0 0; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }
        .wheel-pointer::before { content:''; position:absolute; top:0; left:0; right:0; height:20px; background:#ff0000; border-radius:50%; }
        .wheel-outer { width: 100%; height: 100%; border-radius: 50%; background: #e6e6e6; border: 4px solid #333; padding: 12px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.8); position: relative; }
        .wheel-spin-area { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #ffd700; position: relative; overflow: hidden; background: conic-gradient(#7bc02b 0deg 45deg, #fce92b 45deg 90deg, #f28e1c 90deg 135deg, #e8252a 135deg 180deg, #e21783 180deg 225deg, #852899 225deg 270deg, #1a459b 270deg 315deg, #1bb2e0 315deg 360deg); transition: transform 4s cubic-bezier(0.1, 2.7, 0.2, 1); box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        .wheel-spin-area::before { content: ''; position: absolute; inset: 0; border-radius: 50%; background: repeating-conic-gradient(from -0.5deg, transparent 0deg, transparent 44deg, #333 44deg, #333 45deg); }
        .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: #ffd700; border-radius: 50%; z-index: 5; border: 2px solid #b8860b; box-shadow: 0 0 15px rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; }
        .wheel-center-inner { width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle at 50% 30%, #4db8ff, #0056b3); border: 3px solid #003d82; box-shadow: inset 0 -5px 10px rgba(0,0,0,0.5), inset 0 5px 10px rgba(255,255,255,0.5); }
        .wheel-legend { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 10px; text-align: left; }
        .legend-item { background: #222; padding: 5px 10px; border-radius: 5px; border-left: 3px solid; display: flex; justify-content: space-between; }
        .dot { position: absolute; width: 8px; height: 8px; background: radial-gradient(circle, #fff, #aaa); border-radius: 50%; box-shadow: 0 0 4px #000; }
        .roulette-wrap { width: 100%; height: 130px; border: 2px solid var(--border); position: relative; overflow: hidden; background: #111; margin: 20px 0; border-radius: 8px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .roulette-tape { display: flex; height: 100%; transition: transform 10s cubic-bezier(0.1, 0, 0.1, 1); }
        .r-item { width: 110px; height: 100%; flex-shrink: 0; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; text-align:center; padding: 5px; background: #1a1a1a; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);}
        .r-pointer { position: absolute; top: 0; bottom: 0; left: 50%; width: 4px; background: #e74c3c; z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px #e74c3c;}
    </style>
</head>
<body>

<header id="main-header">
    <div class="header-left">
        <div id="player-name">ИГРОК</div>
    </div>
    <div class="header-center">
        <div id="balance-display">0</div>
    </div>
    <div class="header-right" id="reb-wrap">
        <div class="reb-count" id="reb-title">ПЕРЕРОЖДЕНИЯ</div>
        <div id="reb-label">0</div>
    </div>
</header>

<div class="stage">
    <div id="coin-container">
        <div id="coin" onpointerdown="Game.tap(event)">
            <div class="coin-face front" id="coin-face-f">N</div>
            <div class="coin-face back" id="coin-face-b">N</div>
        </div>
    </div>
</div>

<div class="bottom-ui">
    <div class="bars-container">
        <div class="energy-block">
            <div class="energy-text" id="main-bar-text">ЭНЕРГИЯ: <span id="v-nrg" style="color:#fff">250/250</span></div>
            <div class="bar-wrap"><div id="f-nrg" class="bar-fill"></div></div>
        </div>
        <div class="energy-block" id="nitro-block">
            <div class="energy-text" id="nitro-text">НИТРО: <span id="v-nitro" style="color:var(--nitro)">0%</span></div>
            <div class="bar-wrap" id="nitro-wrap">
                <div id="f-nitro" class="nitro-fill"></div>
            </div>
        </div>
    </div>

    <div class="btn-grid" id="main-btns">
        <div class="btn" onclick="UI.open('shop')">МАГАЗИН</div>
        <div class="btn btn-gold" onclick="UI.open('wheel')">КОЛЕСО</div>
        <div class="btn btn-full btn-purple" onclick="UI.open('cases')">КЕЙСЫ УЛУЧШЕНИЙ</div>
        <div class="btn" onclick="UI.open('ach')">УСПЕХИ</div>
        <div class="btn" onclick="UI.open('promo')">ПРОМОКОДЫ</div>
        <div class="btn btn-full btn-accent" onclick="UI.open('reb')">СДЕЛАТЬ ПЕРЕРОЖДЕНИЕ</div>
    </div>
    
    <div class="dim-btn-wrap" id="portal-wrap" style="display:none;">
        <div class="btn btn-full btn-portal" onclick="Logic.switchDimension()">КВАНТОВЫЙ ПРЫЖОК</div>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-header">
        <h2 id="m-title" style="margin:0; text-transform:uppercase;">МЕНЮ</h2>
        <button class="close-btn" id="m-close" onclick="UI.close()">×</button>
    </div>
    <div class="content" id="m-body"></div>
</div>

<div id="ach-popup">
    <h1 style="color:var(--gold); text-shadow:0 0 15px #ff4500; font-size:24px; margin:0;">НОВЫЙ РАНГ УСПЕХА!</h1>
    <div style="width:80px; height:80px; background:rgba(255,255,255,0.1); border-radius:15px; padding:10px; display:flex; justify-content:center; align-items:center; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);">
        <img id="ach-popup-img" src="" style="width:100%; height:100%; object-fit:contain;">
    </div>
    <h2 id="ach-popup-title" style="color:#fff; font-size:20px; margin:0;">РАДУЖНАЯ</h2>
    <p style="color:#aaa; font-size:12px; margin:0;">Твоя мощь возросла!</p>
    <button class="buy" style="margin-top:10px; width:100%;" onclick="Logic.closeAchPopup()">КРУТО!</button>
</div>

<div style="position:fixed; bottom:5px; right:5px; font-size:10px; color:#555; z-index:9999;">
    <a href="https://t.me/KINETIK_k" style="color:#555; text-decoration:none;">KINETIK</a> | v 1.6
</div>

<script>
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F5' || (e.ctrlKey && (e.key === 'r' || e.key === 'R'))) { e.preventDefault(); }
    });
    window.addEventListener('beforeunload', function (e) { Game.save(); e.preventDefault(); e.returnValue = ''; });

    const Sounds = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        play(type) {
            if (this.ctx.state === 'suspended') this.ctx.resume();
            const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.connect(g); g.connect(this.ctx.destination);
            if(type==='tap') { o.type='sine'; o.frequency.setTargetAtTime(400, this.ctx.currentTime, 0.02); g.gain.setValueAtTime(0.2, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1); o.start(); o.stop(this.ctx.currentTime + 0.1); }
            if(type==='buy') { o.type='square'; o.frequency.setValueAtTime(400, this.ctx.currentTime); o.frequency.linearRampToValueAtTime(800, this.ctx.currentTime+0.1); g.gain.setValueAtTime(0.05, this.ctx.currentTime); g.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.15); o.start(); o.stop(this.ctx.currentTime + 0.15); }
            if(type==='error') { o.type='sawtooth'; o.frequency.setValueAtTime(100, this.ctx.currentTime); g.gain.setValueAtTime(0.1, this.ctx.currentTime); g.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.2); o.start(); o.stop(this.ctx.currentTime + 0.2); }
            if(type==='tick') { o.type='triangle'; o.frequency.setValueAtTime(800, this.ctx.currentTime); g.gain.setValueAtTime(0.05, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05); o.start(); o.stop(this.ctx.currentTime + 0.05); }
            if(type==='win') { o.type='sine'; o.frequency.setValueAtTime(400, this.ctx.currentTime); o.frequency.linearRampToValueAtTime(600, this.ctx.currentTime+0.2); o.frequency.linearRampToValueAtTime(1000, this.ctx.currentTime+0.4); g.gain.setValueAtTime(0.1, this.ctx.currentTime); g.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime+0.6); o.start(); o.stop(this.ctx.currentTime+0.6); }
            if(type==='nitro') { o.type='sawtooth'; o.frequency.setValueAtTime(200, this.ctx.currentTime); o.frequency.exponentialRampToValueAtTime(900, this.ctx.currentTime+0.5); g.gain.setValueAtTime(0.15, this.ctx.currentTime); g.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime+1); o.start(); o.stop(this.ctx.currentTime+1); }

                let currName = Game.dim === 0 ? "🪙" : "🔮";
                ups.forEach(u => {
                    b.innerHTML += `<div class="item"><div><b style="color:${Game.dim===1?'var(--accent)':'#fff'}">${u.n}</b><br><span style="color:#aaa; font-size:10px">${u.d}</span><br><span style="color:${Game.dim===1?'var(--text)':'var(--gold)'}; font-weight:bold;">${u.c.toLocaleString()} ${currName}</span></div><button class="buy" onclick="Logic.buy(${u.id})">СИНТЕЗ</button></div>`;
                });
            }
            if(type==='ach') {
                document.getElementById('m-title').innerText = "УСПЕХИ";
                AchData.forEach((a, idx) => {
                    let ok = Game.total >= a.v;
                    let isNew = (idx === Game.highestAch);
                    let iconHtml = `<div style="width:45px;height:45px;background:${a.col}20;border:2px solid ${ok?a.col:'#333'};border-radius:8px;margin-right:15px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 0 10px ${ok?a.col+'80':'transparent'};">
                        ${ok ? `<img src="${a.img}" alt="ach" style="width:100%;height:100%;object-fit:cover;">` : '<span style="font-size:24px">🔒</span>'}
                    </div>`;
                    b.innerHTML += `<div class="item" style="${ok?'border-color:'+a.col:''} ${isNew?'box-shadow: 0 0 15px '+a.col:''}">
                        <div style="display:flex; align-items:center;">${iconHtml}<span style="color:${ok?'#fff':'#555'}; font-weight:bold;">${ok ? a.n : 'Секрет'}</span></div>
                        <b style="color:${ok?a.col:'#555'}">${ok?'ПОЛУЧЕНО':a.v.toLocaleString()}</b>
                    </div>`;
                });
            }
            if(type==='reb') {
                document.getElementById('m-title').innerText = "ПЕРЕРОЖДЕНИЕ";
                let cost = Math.pow(10, 6 + Game.reb);
                b.innerHTML = `<div style="text-align:center; padding: 20px;"><p style="color:#aaa; margin-bottom:20px;">Сброс прогресса, инвентаря и всех баффов! Множитель дохода увеличивается навсегда!</p><h2 style="color:var(--gold); font-size:40px;">x${Game.reb+2}</h2><p style="margin: 20px 0;">Цена: <b>${cost.toLocaleString()}</b> 🪙</p><button class="buy" style="width:100%; padding:15px; background:var(--accent); color:#fff;" onclick="Logic.rebirth()">ПОДТВЕРДИТЬ</button></div>`;
            }
            if(type==='promo') {
                document.getElementById('m-title').innerText = "ПРОМОКОДЫ";
                b.innerHTML = `<div style="padding: 20px; text-align:center;"><input id="p-in" type="text" placeholder="Введите код..." class="nick-input"><button class="buy" style="width:100%;padding:15px;" onclick="Logic.promo()">АКТИВИРОВАТЬ</button></div>`;
            }
        },
        close() { document.getElementById('modal').style.display='none'; Sounds.play('error'); Game.save(); }
    };

    const Logic = {
        wheelDegree: 0, isSpinning: false,
        saveNick() { let v = document.getElementById('nick-in').value.trim(); if(v.length > 0) { Game.nickname=v; document.getElementById('player-name').innerText=v; UI.close(); Sounds.play('win'); Game.save(); } else Sounds.play('error'); },
        activateNitro() { Game.isNitroActive = true; Game.activeTimer = Game.maxActiveTimer; Sounds.play('nitro'); document.getElementById('coin-face-f').classList.add('nitro-active-fx'); document.getElementById('coin-face-b').classList.add('nitro-active-fx'); },
        
        buy(id) {
            if(Game.dim === 0) {
                let u = Game.upgrades[id];
                if(Game.score >= u.c) { Game.score -= u.c; Game.pC += u.p; Game.pS += u.s; u.c = Math.floor(u.c*2.8); Sounds.play('buy'); UI.open('shop'); Game.update(); Game.save(); } else Sounds.play('error');
            } else {
                let u = Game.vd.upgrades[id];
                if(Game.vd.s >= u.c) { Game.vd.s -= u.c; Game.vd.pC += u.p; Game.vd.pS += u.s; u.c = Math.floor(u.c*4); Sounds.play('buy'); UI.open('shop'); Game.update(); Game.save(); } else Sounds.play('error');
            }
        },
        
        startRoulette(id) {
            let cfg = CaseConfig[id]; if(Game.score < cfg.cost) { Sounds.play('error'); return; }
            Game.score -= cfg.cost; Game.update(); Game.save();
            let getDrop = () => { let r = Math.random() * 100; let sum = 0; for(let d of cfg.drops) { sum += d.c; if(r <= sum) return d; } return cfg.drops[0]; };
            let tapeItems = []; for(let i=0; i<60; i++) tapeItems.push(getDrop()); let winner = tapeItems[50]; 
            UI.open('roulette'); document.getElementById('m-close').style.display = 'none'; 
            let tapeHtml = tapeItems.map(d => `<div class="r-item"><img src="${cfg.dropImg}" style="width:50px; height:50px; object-fit:contain; margin-bottom:5px;"><br><span style="color:#fff">${d.n}</span></div>`).join('');
            document.getElementById('r-body').innerHTML = `<div class="roulette-wrap" id="r-wrap"><div class="r-pointer"></div><div class="roulette-tape" id="r-tape">${tapeHtml}</div></div><button class="buy" id="r-claim" style="display:none; width:100%; background:var(--accent); color:#fff; padding: 15px;" onclick="Logic.claimItem(${id}, ${winner.v}, '${winner.n}')">ЗАБРАТЬ</button>`;
            setTimeout(() => {
                let wrapW = document.getElementById('r-wrap').offsetWidth;
                let targetX = (50 * 110 + 55) - (wrapW / 2) + ((Math.random() - 0.5) * 80);
                document.getElementById('r-tape').style.transform = `translateX(-${targetX}px)`; Sounds.play('buy');
                setTimeout(() => { document.getElementById('r-claim').style.display = 'block'; document.getElementById('m-title').innerText = `ВЫПАЛО: ${winner.n}!`; Sounds.play('win'); }, 10000); 
            }, 100);
        },
        claimItem(id, val, name) { Game.inventory.push({ type: CaseConfig[id].type, val, name, img: CaseConfig[id].dropImg, id: Date.now()+"" }); Game.save(); UI.open('inventory'); },
        equipItem(id) {
            let item = Game.inventory.find(i => i.id == id);
            if(item) {
                if(item.type === 'click') Game.activeClickMult = item.val;
                if(item.type === 'auto') Game.activeAutoMult = item.val;
                if(item.type === 'nitro') { Game.activeNitroCD = item.val; Game.maxNitroTimer = item.val; if(Game.nitroTimer > item.val) Game.nitroTimer = item.val; }
                if(item.type === 'energy') { Game.activeEnergyMult = item.val; Game.maxNrg = 250 * item.val; if(Game.nrg > Game.maxNrg) Game.nrg = Game.maxNrg; }
                Game.save(); Game.update(); Sounds.play('buy'); UI.open('inventory'); 
            }
        },
        rebirth() {
            let cost = Math.pow(10, 6 + Game.reb);
            if(Game.score >= cost) { 
                Game.reb++; Game.score=0; Game.pC=1; Game.pS=0; 
                Game.upgrades.forEach(u=>u.c=u.id==0?200:(u.id==1?3000:(u.id==2?80000:700000))); 
                Game.inventory = []; Game.activeClickMult=1; Game.activeAutoMult=1; Game.activeNitroCD=30; Game.activeEnergyMult=1; Game.maxNrg=250; Game.maxNitroTimer=30; Game.nitroTimer=30; Game.isNitroActive=false;
                Sounds.play('win'); UI.close(); Game.update(); Game.save(); 
            } else Sounds.play('error');
        },
        promo() {
            let c = document.getElementById('p-in').value;
            const codes = {"8393763": 1000000};
            if(codes[c]) {
                if(Game.usedPromos.includes(c)) {
                    Sounds.play('error');
                    alert('Этот промокод уже был использован!');
                } else {
                    Game.usedPromos.push(c);
                    Game.score += codes[c]; Game.total += codes[c]; 
                    Sounds.play('win'); UI.close(); Game.update(); Game.save(); Game.checkAch(false);
                    alert('Промокод успешно активирован! Вы получили бонус.');
                }
            } else { Sounds.play('error'); }
        },
        spinWheel(btn) {
            if(this.isSpinning) return; let now = Date.now();
            if(now - Game.lastSpin < 8*3600000 && Game.extraSpins <= 0) { Sounds.play('error'); return; }
            this.isSpinning = true; btn.disabled = true;
            if (Game.extraSpins > 0) Game.extraSpins--; else Game.lastSpin = now; Game.save();
            const p = [{ v: 10000, c: 35, i: 0 }, { v: 5000, c: 20, i: 1 }, { v: 2000, c: 20, i: 2 }, { v: "JACKPOT", c: 2, i: 3 }, { v: 50000, c: 10, i: 4 }, { v: 100000, c: 8, i: 5 }, { v: 250000, c: 4, i: 6 }, { v: 500000, c: 1, i: 7 }];
            let r = Math.random() * 100; let sum = 0; let win = p[0]; for(let d of p) { sum += d.c; if(r <= sum) { win=d; break; } }
            this.wheelDegree += (360 * 5) + (360 - (win.i * 45)) - (Math.floor(Math.random()*35)+5);
            document.getElementById('wheel-res').innerText = "КРУТИМ...";
            document.getElementById('visual-wheel').style.transform = `rotate(${this.wheelDegree}deg)`;
            let tks=0; let tI=setInterval(()=>{ Sounds.play('tick'); tks++; if(tks>25) clearInterval(tI); }, 150);
            setTimeout(() => {
                Sounds.play('win');
                document.getElementById('wheel-res').innerText = win.v === "JACKPOT" ? "ДЖЕКПОТ! +5 СПИНОВ" : `ВЫИГРЫШ: +${win.v.toLocaleString()}`;
                if(win.v === "JACKPOT") Game.extraSpins += 5; else { Game.score += win.v; Game.total += win.v; }
                Game.update(); Game.save(); Game.checkAch(false);
                this.isSpinning = false; btn.disabled = false;
                if(Game.extraSpins <= 0) { btn.disabled = true; btn.innerText = "ЖДИТЕ 8 ЧАСОВ"; btn.style.background = "#fff"; }
            }, 4000);
        },

        showAchPopup(achObj) {
            const p = document.getElementById('ach-popup');
            document.getElementById('ach-popup-img').src = achObj.img;
            document.getElementById('ach-popup-title').innerText = achObj.n.toUpperCase();
            document.getElementById('ach-popup-title').style.color = achObj.col;
            p.classList.add('show');
            Sounds.play('win');
            
            for(let i=0; i<10; i++) {
                let g = document.createElement('div'); g.className='ach-glitter';
                g.style.left = (Math.random()*100) + '%'; g.style.top = (Math.random()*100) + '%';
                g.style.animationDelay = (Math.random()*1) + 's';
                p.appendChild(g);
                setTimeout(()=>g.remove(), 4000);
            }
        },
        closeAchPopup() { document.getElementById('ach-popup').classList.remove('show'); Sounds.play('tap'); },

        switchDimension() {
            Game.dim = Game.dim === 0 ? 1 : 0;
            Game.applyDimensionStyle();
            Game.update();
            Game.save();
            Sounds.play('nitro');
            
            const p = document.createElement('div');
            p.style.position = 'fixed'; p.inset = '0'; p.style.background = Game.dim === 1 ? '#b366ff' : '#fff';
            p.style.zIndex = '99999'; p.style.pointerEvents = 'none'; p.style.transition = 'opacity 0.6s ease-out';
            document.body.appendChild(p);
            setTimeout(() => p.style.opacity = '0', 50);
            setTimeout(() => p.remove(), 650);
        }
    };

    Game.init();
</script>
</body>
</html>
